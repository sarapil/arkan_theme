{% extends "templates/web.html" %}

{% block title %}{{ _("ARKAN Theme Onboarding") }}{% endblock %}

{% block page_content %}
<div id="arkan_theme-onboarding-container" data-page="arkan_theme-onboarding"></div>

<style>
  #arkan_theme-onboarding-container { min-height: 80vh; padding: 24px 0; }
  .at-onboard-hero { text-align: center; padding: 60px 20px; }
  .at-onboard-hero h1 { font-size: 2rem; font-weight: 700; color: var(--text-color); margin-bottom: 16px; }
  .at-onboard-hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto 32px; }
  .at-onboard-steps { max-width: 700px; margin: 0 auto; padding: 0 20px; }
  .at-step { display: flex; gap: 16px; padding: 20px 0; border-bottom: 1px solid var(--border-color); }
  .at-step-num { width: 40px; height: 40px; border-radius: 50%; background: rgba(30, 64, 175, 0.1); color: #1E40AF; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
  .at-step h3 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
  .at-step p { font-size: 0.9rem; color: var(--text-muted); }
  .at-onboard-footer { text-align: center; padding: 40px 20px; }
  .at-onboard-footer a { display: inline-block; padding: 12px 32px; border-radius: 8px; background: #1E40AF; color: white; text-decoration: none; font-weight: 600; transition: opacity 0.2s; }
  .at-onboard-footer a:hover { opacity: 0.9; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const container = document.getElementById('arkan_theme-onboarding-container');
  const steps = [
    { title: __("Install Theme"), desc: __("ARKAN Theme activates automatically after installation. Dark-first design with neon accents.") },
    { title: __("Customize Colors"), desc: __("Use Theme Settings to adjust primary/accent colors, neural-grid density, and neon glow intensity.") },
    { title: __("Dark/Light Toggle"), desc: __("Switch between dark cyber-tech mode and light professional mode from the navbar.") },
    { title: __("Font Configuration"), desc: __("Choose from curated font pairings optimized for both English and Arabic text.") },
    { title: __("RTL Support"), desc: __("Verify Arabic layout — all components auto-mirror for RTL with proper neon trail directions.") }
  ];
  container.innerHTML = `
    <div class="at-onboard-hero">
      <h1>🚀 ${__("Get Started with ARKAN Theme")}</h1>
      <p>${__("Follow these steps to set up and start using ARKAN Theme.")}</p>
    </div>
    <div class="at-onboard-steps">
      ${steps.map((s, i) => `
        <div class="at-step">
          <div class="at-step-num">${i + 1}</div>
          <div>
            <h3>${s.title}</h3>
            <p>${s.desc}</p>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="at-onboard-footer">
      <a href="/app">${__("Go to Dashboard →")}</a>
    </div>
  `;
});
</script>
{% endblock %}
