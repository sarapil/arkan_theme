{% extends "templates/web.html" %}
{% block title %}404 — Node Not Found{% endblock %}
{% block page_content %}
<div style="min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0A0F1C;color:#E8ECF1;text-align:center;font-family:'Space Grotesk',sans-serif;padding:40px 20px;">
    <div style="font-size:120px;font-weight:700;line-height:1;background:linear-gradient(135deg,#00F0FF,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glitch 3s infinite;position:relative;">
        404
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:14px;color:#00F0FF;margin-top:12px;letter-spacing:0.1em;">
        // NODE_NOT_FOUND
    </div>
    <p style="color:#94A3B8;max-width:400px;margin-top:16px;font-size:15px;">
        The requested resource could not be located in the neural network.
        It may have been moved, deleted, or never existed.
    </p>
    <a href="/desk" style="display:inline-block;margin-top:24px;padding:12px 32px;background:linear-gradient(135deg,#00F0FF,#8B5CF6);color:#0A0F1C;font-weight:600;border-radius:10px;text-decoration:none;transition:box-shadow 0.3s;">
        &lt; Return to Base /&gt;
    </a>
    <div style="position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#00F0FF,#8B5CF6,#00F0FF);"></div>
    <style>
        @keyframes glitch {
            0%,100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); filter: hue-rotate(90deg); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); filter: hue-rotate(-90deg); }
            80% { transform: translate(2px, -2px); }
        }
    </style>
</div>
{% endblock %}
