  <defs><linearGradient id="la" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00F0FF"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient></defs>
  <polygon points="60,10 110,100 10,100" stroke="url(#la)" stroke-width="2" fill="none">
